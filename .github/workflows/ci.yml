name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read   # default; release job upgrades to write
  packages: write  # needed for ghcr.io push

env:
  IMAGE_NAME: rustfs-exporter
  BINARY_NAME: rustfs-exporter

jobs:
  # ===========================================================================
  # ALWAYS-RUN JOBS (on push, PR, and tags)
  # ===========================================================================

  test:
    name: test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.22']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: go mod download
        working-directory: exporter
        run: go mod download

      - name: go vet
        working-directory: exporter
        run: go vet ./...

      - name: go test
        working-directory: exporter
        run: go test -race -coverprofile=coverage.out ./...

      - name: go build
        working-directory: exporter
        run: go build ./...

  lint-config:
    name: lint configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: validate dashboard JSON
        run: |
          for f in dashboards/*.json; do
            python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$f" || exit 1
          done
          echo "dashboards-ok"

      - name: validate OpenShift YAML
        run: |
          python3 -c "
          import yaml, glob, sys
          errs = 0
          for f in sorted(glob.glob('openshift/*.yaml')):
              docs = list(yaml.safe_load_all(open(f)))
              docs = [d for d in docs if d]
              if not docs:
                  print('  EMPTY ' + f); errs += 1
              else:
                  for d in docs:
                      k = d.get('kind','?'); n = d.get('metadata',{}).get('name','?')
                      print('  OK   ' + f + '  ' + k + '/' + n)
          sys.exit(errs)
          "

      - name: validate systemd unit syntax
        run: |
          for f in systemd/etc/*.service; do
            for needle in '\[Unit\]' '\[Service\]' '\[Install\]' 'ExecStart='; do
              grep -qE "$needle" "$f" || { echo "missing $needle in $f"; exit 1; }
            done
          done
          echo "systemd-units-ok"

  # ===========================================================================
  # TAG-ONLY JOBS (only on tag pushes like v0.1.0, v1.2.3)
  # ===========================================================================

  binary:
    name: binary (${{ matrix.os }}/${{ matrix.arch }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            goarch: amd64
          - os: linux
            arch: arm64
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: build static binary
        working-directory: exporter
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p ../dist
          out="../dist/${BINARY_NAME}-${{ matrix.os }}-${{ matrix.arch }}"
          go build -trimpath -ldflags="-s -w" -o "$out" ./cmd/exporter
          sha256sum "$out" > "${out}.sha256"
          chmod 0644 "$out" "${out}.sha256"

      - name: package tarball
        working-directory: dist
        env:
          TARGET_BASE: ${{ env.BINARY_NAME }}-${{ matrix.os }}-${{ matrix.arch }}
        run: |
          mkdir -p staging
          mv "${TARGET_BASE}" staging/
          mv "${TARGET_BASE}.sha256" staging/
          tar -czf "${TARGET_BASE}.tar.gz" -C staging .
          ls -lh "${TARGET_BASE}.tar.gz"

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/${{ env.BINARY_NAME }}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          retention-days: 14

  image:
    name: docker image (push on tag)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: set up buildx
        uses: docker/setup-buildx-action@v3

      - name: derive image tags
        id: tags
        run: |
          # Strip leading 'v' from the tag name
          VER="${GITHUB_REF_NAME#v}"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"

      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: exporter
          push: true
          tags: |
            ghcr.io/6547709/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.version }}
            ghcr.io/6547709/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, binary]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: list downloaded artifacts
        run: ls -lh artifacts/

      - name: write release notes
        run: |
          {
            echo "## ${{ github.ref_name }}"
            echo ""
            echo "Pre-built static binaries for direct host installation (systemd deployment)."
            echo ""
            echo "### Downloads"
            echo ""
            echo "| File | Architecture |"
            echo "|---|---|"
            for arch_dir in artifacts/*/; do
              arch_name=$(basename "$arch_dir")
              echo "| \`rustfs-exporter-${arch_name}.tar.gz\` | ${arch_name} |"
            done
            echo ""
            echo "Each tarball contains:"
            echo "- \`rustfs-exporter-linux-{amd64,arm64}\` — static binary"
            echo "- \`rustfs-exporter-linux-{amd64,arm64}.sha256\` — checksum"
            echo ""
            echo "### Docker"
            echo ""
            echo '```bash'
            echo "docker pull ghcr.io/6547709/rustfs-exporter:${{ github.ref_name }}"
            echo '```'
            echo ""
            echo "Multi-arch image: linux/amd64 + linux/arm64."
            echo ""
            echo "### Verify"
            echo ""
            echo '```bash'
            echo "# extract"
            echo "tar -xzf rustfs-exporter-linux-amd64.tar.gz"
            echo "# check checksum"
            echo "sha256sum -c rustfs-exporter-linux-amd64.sha256"
            echo "# install"
            echo "sudo install -m 0755 rustfs-exporter-linux-amd64 /usr/local/bin/rustfs-exporter"
            echo '```'
            echo ""
            echo "See \`systemd/README.md\` for the full systemd install + SELinux notes."
          } > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/**/*.tar.gz