apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: grafana
  namespace: rustfs-monitoring
  labels:
    app: grafana
  annotations:
    # Customize these for your environment
    haproxy.router.openshift.io/timeout: 60s
spec:
  to:
    kind: Service
    name: grafana
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None