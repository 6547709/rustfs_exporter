apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-cfg
  namespace: rustfs-monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: rustfs
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: false
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false