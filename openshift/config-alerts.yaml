apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerts
  namespace: rustfs-monitoring
  labels:
    app: grafana
data:
  alerts.yaml: |-
    apiVersion: 1
    groups:
    - orgId: 1
      name: rustfs
      folder: RustFS
      interval: 1m
      rules:
      - uid: rustfs-cluster-unhealthy
        title: Cluster unhealthy
        condition: A
        data:
        - refId: A
          datasourceUid: PBFA97CFB590B2093
          relativeTimeRange:
            from: 300
            to: 0
          model:
            expr: 'rustfs_health_ready{component="storage"} == 0
    
              or rustfs_health_ready{component="iam"} == 0
    
              or rustfs_health_ready{component="lock"} == 0
    
              '
            refId: A
        noDataState: NoData
        execErrState: Error
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: RustFS cluster not ready
          description: One of storage/iam/lock has been not-ready for 1m.
      - uid: rustfs-replication-pending-large
        title: Replication pending too large
        condition: A
        data:
        - refId: A
          datasourceUid: PBFA97CFB590B2093
          relativeTimeRange:
            from: 600
            to: 0
          model:
            expr: rustfs_replication_pending_bytes > 10e9
            refId: A
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Bucket {{ $labels.bucket }} has > 10GB pending replication
          description: Pending replication for bucket {{ $labels.bucket }} has been > 10GB for 10m.
      - uid: rustfs-exporter-down
        title: Exporter down
        condition: A
        data:
        - refId: A
          datasourceUid: PBFA97CFB590B2093
          relativeTimeRange:
            from: 120
            to: 0
          model:
            expr: rustfs_up == 0
            refId: A
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: rustfs-exporter unreachable
          description: rustfs_up has been 0 for 2m; check exporter container.

